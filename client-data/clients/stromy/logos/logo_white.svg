<svg viewBox="0 0 380 90" xmlns="http://www.w3.org/2000/svg">
  <!-- STROMY — White Wordmark (dark background) -->
  <circle cx="30" cy="42" r="8" fill="none" stroke="#ECE6DA" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="30" cy="42" r="2.2" fill="#B96034"/>
  <!-- Upper route stem (ghost) -->
  <line x1="38" y1="37" x2="56" y2="37" stroke="#ECE6DA" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
  <!-- Lower route stem (oxide signal) -->
  <line x1="38" y1="47" x2="52" y2="47" stroke="#B96034" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="64" y="53" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="44" font-weight="500" fill="#ECE6DA" letter-spacing="5">STROMY</text>
</svg>
