  <path d="M 24 24 C 24 24, 72 24, 72 48 C 72 72, 24 72, 24 72"
        fill="none" stroke="#ECE6DA" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Central node at inflection point -->
  <circle cx="48" cy="48" r="4.4" fill="none" stroke="#ECE6DA" stroke-width="2.2"/>
  <circle cx="48" cy="48" r="2.2" fill="#B96034"/>
