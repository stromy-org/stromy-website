name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  astro-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run tokens
      - run: npx astro check
      - run: npm run build
